<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Procon Gamepad Mapper Demo</title>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Procon Gamepad Mapper</h1>
          <p>Chrome Gamepad API input monitor for Nintendo Switch Pro Controller.</p>
        </div>
        <div class="status" id="supportStatus">Checking Gamepad API...</div>
      </header>

      <section class="layout">
        <section class="panel">
          <h2>Gamepads</h2>
          <div id="gamepads" class="list"></div>
        </section>

        <section class="panel">
          <h2>Actions</h2>
          <div id="actions" class="grid"></div>
        </section>

        <section class="panel">
          <h2>Physical Inputs</h2>
          <div id="inputs" class="grid dense"></div>
        </section>

        <section class="panel">
          <h2>Axes</h2>
          <div id="axes" class="list"></div>
        </section>

        <section class="panel">
          <h2>Settings</h2>
          <label class="field">
            <span>Dead zone</span>
            <input id="deadZone" type="range" min="0" max="1" step="0.05" value="0.3" />
            <output id="deadZoneValue">0.30</output>
          </label>
          <div class="buttons">
            <button id="saveButton" type="button">Save</button>
            <button id="loadButton" type="button">Load</button>
            <button id="resetButton" type="button">Reset</button>
          </div>
        </section>

        <section class="panel">
          <h2>Event Log</h2>
          <ol id="eventLog" class="event-log"></ol>
        </section>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
